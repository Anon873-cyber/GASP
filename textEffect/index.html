<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: #000;
            color: #fff;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        h1 span {
            display: inline-block;
        }

        h1 {
            font-size: 5rem;
        }
    </style>
</head>

<body>
    <h1>Alpha</h1>
</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
    var text = document.querySelector('h1');
    var chars = text.textContent.split('');
    var clutter = ''
    chars.forEach(function (char, index) {
        if( index <chars.length/2) {
            clutter += `<span class="first">${char}</span>`;
        } else {
            clutter += `<span class="second">${char}</span>`;
        }
        
    });
    text.innerHTML = clutter

        gsap.from('.first',  {
        opacity: 0,
        y: 50,
        stagger: 0.1,
        duration: 1,
        ease: 'power2.out',
        delay: 0.5
    })
        gsap.from('.second',  {
        opacity: 0,
        y: 80,
        stagger: -0.1,
        duration: 1,
        ease: 'power2.out',
        delay: 0.5
    })

</script>

</html>

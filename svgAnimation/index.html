<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        #string {
            height: 2000px;
            width: 100%;
          
        }
        svg{
            background-color:red
        }

        body {
            margin: 0;
            padding: 0;
            background: black;
        }
    </style>
    <title>Document</title>
</head>

<body>

    <div id="string">
        <svg width="5000" height="200">
            <path d="M 0 80 Q 500 80 4090 80" stroke="black" fill="transparent" />
        </svg>
    </div>
</body>
 <!-- GSAP CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
var path = `M 0 80 Q 225 80 490 80`;
var finalPath = "M 0 80 Q 225 80 490 80";
var string = document.querySelector("#string")

string.addEventListener("mousemove",(mouse) => { 
  path = `M 0 80 Q 225 ${mouse.y} 490 80`;
  
  console.log(path)

  gsap.to("svg path", {
    duration: 0.5,
    attr: { d: path },
    ease: "bounce.out"
  });
 })

string.addEventListener("mouseleave",(mouse) => { 
    
    gsap.to("svg path", {
    duration: 0.5,
    attr: { d: finalPath },
    ease: "power2.out"
  });
 })

</script>

</html>

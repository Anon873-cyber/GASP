<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP Boilerplate</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .ri-close-line {
            position: absolute;
            top: 1rem;
            border-radius: 50%;
            padding: 0.5rem;
            background-color: #fff;
            font-weight: 500;
            color: #000;
            cursor: pointer;
            right: 1rem;
        }

        nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 20%;
            left: -25%;
            height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.95rem;
        }

        .menu-icon {
            position: absolute;
            top: 2rem;
            padding-left: 2.5rem;
            font-size: 2.5rem;
            color: #fff;
            cursor: pointer;
            z-index: 10;
        }

        main {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        main::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.28), rgba(0, 0, 0, 0.76));
            pointer-events: none;
        }
    </style>
</head>

<body>
    <main>
        <i class="ri-menu-line menu-icon"></i>
        <nav>
            <div class="nav-close"><i class="ri-close-line"></i></div>
            <div class="logo"><i class="ri-fire-line"></i>GSAP Studio</div>
            <ul class="nav-links">
                <li><a href="#"><i class="ri-home-2-line"></i>Home</a></li>
                <li><a href="#"><i class="ri-rocket-line"></i>Projects</a></li>
                <li><a href="#"><i class="ri-information-line"></i>About</a></li>
                <li><a href="#"><i class="ri-mail-line"></i>Contact</a></li>
            </ul>
        </nav>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script>
        var tl = gsap.timeline();
        tl.to("nav", {
            left: 0,
            duration: 0.5,
            ease: "power2.inOut"
        });
        tl.from(
            ".nav-links li",
            {
                opacity: 0,
                y: 20,
                stagger: 0.1,
                duration: 0.3,
                ease: "power2.out"
            }
        )
        tl.from(".nav-close", {
            opacity: 0,
            duration: 0.3,
            ease: "power2.out"
        });
        
    </script>
</body>

</html>
